<div class="container mt-5">
  <h2 class="mb-4">📝 Submit Your Feedback</h2>
  <form (ngSubmit)="submitFeedback()" #feedbackForm="ngForm">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" class="form-control" [(ngModel)]="name" name="name" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Role</label>
      <select class="form-select" [(ngModel)]="role" name="role" required>
        <option value="Sender">Sender</option>
        <option value="Recipient">Recipient</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Message</label>
      <textarea class="form-control" rows="4" [(ngModel)]="message" name="message" required></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Submit Feedback</button>
  </form>
</div>
